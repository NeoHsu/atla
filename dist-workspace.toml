[workspace]
members = ["cargo:."]

[dist]
cargo-dist-version = "0.31.0"
# release.yml is intentionally hardened after generation (pinned actions/installers and least privilege).
allow-dirty = ["ci"]
ci = "github"
installers = ["shell", "powershell"]
targets = [
  "aarch64-apple-darwin",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "x86_64-pc-windows-msvc",
  "x86_64-unknown-linux-gnu",
]
packages = ["atla"]
hosting = "github"
pr-run-mode = "plan"
install-path = "CARGO_HOME"
github-attestations = true
cargo-cyclonedx = true
