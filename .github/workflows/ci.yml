name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --exclude atla-jira-api --exclude atla-confluence-api --exclude atla-confluence-v1-api -- -D warnings
      - run: cargo test --workspace

  check-generated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check Java available (for openapi-generator)
        run: java -version || echo "Java not available, skipping"
      - name: Verify generated code is up to date
        run: |
          if command -v java >/dev/null 2>&1; then
            scripts/generate.sh --product all --in-place

            # Restore manually-maintained files (tracked in git but not generated from spec)
            for crate_dir in crates/atla-jira-api crates/atla-confluence-api crates/atla-confluence-v1-api; do
              files_list="${crate_dir}/.openapi-generator/FILES"
              if [[ -f "${files_list}" ]]; then
                # Collect deleted files first (before any git checkout) to avoid index.lock conflicts
                mapfile -t deleted_files < <(git diff --name-only --diff-filter=D "${crate_dir}")
                for deleted in "${deleted_files[@]}"; do
                  rel="${deleted#${crate_dir}/}"
                  if ! grep -qxF "${rel}" "${files_list}" 2>/dev/null; then
                    git checkout -- "${deleted}"
                  fi
                done
              fi
            done

            # Restore hand-edited files that contain necessary fixes not in the spec
            git checkout -- crates/atla-jira-api/src/models/attachment.rs

            git --no-pager diff --exit-code crates/atla-jira-api crates/atla-confluence-api crates/atla-confluence-v1-api || \
              (echo "Generated code is out of date. Please run scripts/generate.sh --product all --in-place" && exit 1)
          else
            echo "Skipping: Java not available"
          fi
