name: Refresh Atlassian specs

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: spec-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Refresh partial specs and manifest
        run: scripts/update-specs.sh
      - name: Verify generated clients and contracts
        run: |
          cargo fmt --all -- --check
          cargo check --workspace
          cargo test --workspace
      - name: Open a reviewable update PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/refresh-atlassian-specs
          delete-branch: true
          commit-message: "chore(specs): refresh Atlassian partial specs"
          title: "chore(specs): refresh Atlassian partial specs"
          body: |
            Automated weekly spec refresh.

            Validation completed:
            - `cargo fmt --all -- --check`
            - `cargo check --workspace`
            - `cargo test --workspace`

            Review `specs/PATCHES.md`, operation changes, generated-client diffs, and manifest hashes before merging.
          labels: dependencies
          add-paths: |
            specs/**
