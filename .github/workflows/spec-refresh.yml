name: Refresh Atlassian specs

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: spec-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Refresh partial specs and manifest
        run: scripts/update-specs.sh
      - name: Verify generated clients and contracts
        run: |
          cargo fmt --all -- --check
          cargo check --workspace
          cargo test --workspace
      - name: Summarize partial-spec changes
        run: |
          python3 scripts/spec-diff-summary.py \
            --base HEAD \
            --output "${RUNNER_TEMP}/spec-refresh-pr.md"
          cat "${RUNNER_TEMP}/spec-refresh-pr.md" >> "${GITHUB_STEP_SUMMARY}"
      - name: Open a reviewable update PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/refresh-atlassian-specs
          delete-branch: true
          commit-message: "chore(specs): refresh Atlassian partial specs"
          title: "chore(specs): refresh Atlassian partial specs"
          body-path: ${{ runner.temp }}/spec-refresh-pr.md
          labels: dependencies
          add-paths: |
            specs/**
