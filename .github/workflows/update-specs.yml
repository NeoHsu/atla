name: Update Specs

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Cache OpenAPI generator
        uses: actions/cache@v5
        with:
          path: ~/.local/share/atla-tools/openapi-generator
          key: openapi-generator-7.22.0

      - name: Refresh Atlassian specs
        run: scripts/update-specs.sh

      - name: Regenerate API clients
        run: scripts/generate.sh --in-place

      - name: Verify generated workspace
        run: cargo check --workspace

      - uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/update-atlassian-specs
          delete-branch: true
          commit-message: "chore: update Atlassian OpenAPI specs"
          title: "chore: update Atlassian OpenAPI specs"
          body: |
            Automated refresh of Atlassian OpenAPI specs and generated API clients.

            This workflow runs `scripts/update-specs.sh`, regenerates the checked-in API crates, and verifies the workspace with `cargo check --workspace`.
