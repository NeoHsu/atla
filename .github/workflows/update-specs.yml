name: Update Specs

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Refresh Atlassian specs
        run: scripts/update-specs.sh

      - name: Verify workspace builds with updated specs
        run: cargo check --workspace

      - uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/update-atlassian-specs
          delete-branch: true
          commit-message: "chore: update Atlassian OpenAPI specs"
          title: "chore: update Atlassian OpenAPI specs"
          body: |
            Automated refresh of Atlassian OpenAPI specs.

            This workflow runs `scripts/update-specs.sh` and verifies the workspace builds with `cargo check --workspace`. Progenitor regenerates API clients at build time from the updated specs.
